name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build CLI
        run: go build -trimpath ./cmd/login-2fa

      - name: Install PAM headers
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Build PAM module
        run: go build -buildmode=c-shared -trimpath ./cmd/pam_login_2fa
