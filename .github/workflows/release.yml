name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            archive: login-2fa-linux-amd64.tar.gz
          - name: linux-arm64
            goos: linux
            goarch: arm64
            archive: login-2fa-linux-arm64.tar.gz
          - name: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
            archive: login-2fa-linux-armv7.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist/release
          go build -trimpath -ldflags="-s -w" -o dist/release/login-2fa ./cmd/login-2fa
          tar -C dist/release -czf dist/${{ matrix.archive }} login-2fa

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}

  build-pam:
    name: Build PAM Module (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goarch: amd64
            archive: pam_login_2fa-linux-amd64.tar.gz
            prepare: ""
            install: sudo apt-get update && sudo apt-get install -y libpam0g-dev
            cc: gcc
          - name: linux-arm64
            goarch: arm64
            archive: pam_login_2fa-linux-arm64.tar.gz
            prepare: |
              sudo sed -i 's/^Architectures: .*/Architectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
              cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-ports.sources >/dev/null
              Types: deb
              URIs: http://ports.ubuntu.com/ubuntu-ports
              Suites: noble noble-updates noble-backports noble-security
              Components: main universe restricted multiverse
              Architectures: arm64
              Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
              EOF
            install: sudo dpkg --add-architecture arm64 && sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross libpam0g-dev:arm64
            cc: aarch64-linux-gnu-gcc
          - name: linux-armv7
            goarch: arm
            goarm: "7"
            archive: pam_login_2fa-linux-armv7.tar.gz
            prepare: |
              sudo sed -i 's/^Architectures: .*/Architectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
              cat <<'EOF' | sudo tee /etc/apt/sources.list.d/ubuntu-ports.sources >/dev/null
              Types: deb
              URIs: http://ports.ubuntu.com/ubuntu-ports
              Suites: noble noble-updates noble-backports noble-security
              Components: main universe restricted multiverse
              Architectures: armhf
              Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
              EOF
            install: sudo dpkg --add-architecture armhf && sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross libpam0g-dev:armhf
            cc: arm-linux-gnueabihf-gcc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Prepare ARM apt sources
        if: matrix.prepare != ''
        run: |
          set -e
          ${{ matrix.prepare }}

      - name: Install PAM toolchain and headers
        run: ${{ matrix.install }}

      - name: Build PAM module
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist/release
          go build -buildmode=c-shared -trimpath -ldflags="-s -w" -o dist/release/pam_login_2fa.so ./cmd/pam_login_2fa
          tar -C dist/release -czf dist/${{ matrix.archive }} pam_login_2fa.so pam_login_2fa.h

      - name: Upload PAM artifact
        uses: actions/upload-artifact@v4
        with:
          name: pam-${{ matrix.name }}
          path: dist/${{ matrix.archive }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-pam
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: linux-*
          merge-multiple: true

      - name: Download PAM artifact
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: pam-linux-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/artifacts/*
          generate_release_notes: true
