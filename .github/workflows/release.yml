name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build CLI
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist/release
          go build -trimpath -ldflags="-s -w" -o dist/release/login-2fa ./cmd/login-2fa
          tar -C dist/release -czf dist/login-2fa-linux-amd64.tar.gz login-2fa

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: login-2fa-linux-amd64
          path: dist/login-2fa-linux-amd64.tar.gz

  build-pam:
    name: Build PAM Module (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Install PAM headers
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - name: Build PAM module
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p dist/release
          go build -buildmode=c-shared -trimpath -ldflags="-s -w" -o dist/release/pam_login_2fa.so ./cmd/pam_login_2fa
          tar -C dist/release -czf dist/pam_login_2fa-linux-amd64.tar.gz pam_login_2fa.so pam_login_2fa.h

      - name: Upload PAM artifact
        uses: actions/upload-artifact@v4
        with:
          name: pam-login-2fa-linux-amd64
          path: dist/pam_login_2fa-linux-amd64.tar.gz

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-cli
      - build-pam
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: login-2fa-*
          merge-multiple: true

      - name: Download PAM artifact
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          name: pam-login-2fa-linux-amd64

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/artifacts/*
          generate_release_notes: true
